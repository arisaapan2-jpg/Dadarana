<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPREME_AI | WAHYU</title>
    <!-- Font Cyberpunk & Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* [ CSS ] - Visual Cyberpunk & Anti-Tumpah */
        :root {
            --neon: #00f2ff;
            --purple: #bc13fe;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; overflow: hidden; }

        /* Navbar & Jam Realtime */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; border-bottom: 1px solid var(--neon);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }
        .logo-text { font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 1.1rem; }
        .rgb-text { color: var(--neon); text-shadow: 0 0 8px var(--neon); }
        #clock { font-family: 'JetBrains Mono', monospace; color: var(--neon); font-size: 0.9rem; }

        /* Chat Area */
        .app-container { height: calc(100vh - 65px); display: flex; flex-direction: column; padding: 10px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: none; }
        
        .msg { padding: 12px 16px; border-radius: 15px; font-size: 14px; max-width: 85%; line-height: 1.5; }
        .bot { align-self: flex-start; background: var(--glass); border-left: 3px solid var(--neon); }
        .user { align-self: flex-end; background: var(--neon); color: black; font-weight: 600; border-bottom-right-radius: 2px; }

        /* Input Area - Rapih untuk HP */
        .input-section { padding: 10px; background: rgba(0,0,0,0.6); border-radius: 20px; }
        .quick-tags { display: flex; gap: 8px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .quick-tags button {
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            padding: 5px 15px; border-radius: 20px; font-size: 11px; white-space: nowrap;
        }
        .input-wrapper { display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; outline: none; }
        #send-btn { background: var(--neon); border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; box-shadow: 0 0 10px var(--neon); cursor: pointer; }

        .hidden { display: none; }
        #loader { text-align: center; color: var(--neon); font-size: 11px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <!-- Navbar & Jam -->
    <nav class="navbar">
        <div class="logo-text">SUPREME<span class="rgb-text">_AI</span></div>
        <div id="clock">00:00:00</div>
    </nav>

    <!-- Chat Container -->
    <main class="app-container">
        <div id="chat-box">
            <div class="msg bot">System Online. Selamat datang, Tuan Wahyu. Instruksi apa yang ingin dieksekusi? ✨</div>
        </div>

        <div id="loader" class="hidden">PROCESSING_COMMAND...</div>

        <!-- Input Section -->
        <div class="input-section">
            <div class="quick-tags">
                <button onclick="quickCmd('/script')">📜 Script</button>
                <button onclick="quickCmd('/music')">🎵 Music ID</button>
                <button onclick="quickCmd('/logo')">🎨 Logo</button>
            </div>
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Tanya AI Supreme..." autocomplete="off">
                <button id="send-btn">SEND</button>
            </div>
        </div>
    </main>

    <script>
        // [ JS ] - Logika AI Pintar
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loader = document.getElementById('loader');

        // Fix Jam Realtime agar tidak 00:00:00
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID');
        }, 1000);

        function addBubble(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function quickCmd(v) {
            input.value = v;
            handleAI();
        }

        async function handleAI() {
            const val = input.value.trim();
            if (!val) return;

            addBubble(val, 'user');
            input.value = "";
            loader.classList.remove('hidden');

            setTimeout(() => {
                loader.classList.add('hidden');
                const p = val.toLowerCase();

                // Logika Jawaban AI Otomatis
                if (p.includes("script")) {
                    addBubble("📜 **ROBLOX SCRIPT GENERATED**\n```lua\nprint('Wahyu Supreme Active')\n-- Script basis auto-farm\n
```", "bot");
                } else if (p.includes("music")) {
                    addBubble("🎵 **MUSIC ID FOUND**\n• DJ Santai: 1845321\n• Phonk Mix: 5421992", "bot");
                } else if (p.includes("logo")) {
                    const seed = Math.floor(Math.random() * 999);
                    addBubble(`🎨 **LOGO READY**\n<img src="https://api.dicebear.com/7.x/bottts/svg?seed=${seed}" width="80" style="margin-top:10px; border:1px solid var(--neon);">`, "bot");
                } else {
                    addBubble("Instruksi diterima, Tuan Wahyu. Sedang memproses data... Selesai! ✨", "bot");
                }
            }, 1000);
        }

        sendBtn.addEventListener('click', handleAI);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAI(); });
    </script>
</body>
</html>
