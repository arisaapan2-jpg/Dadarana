<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPREME_AI | WAHYU</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon: #00f2ff;
            --purple: #bc13fe;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; overflow: hidden; }

        /* Navbar Sempurna */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; border-bottom: 1px solid var(--neon);
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
        }
        .logo-text { font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 1.1rem; letter-spacing: 2px; }
        .rgb-text { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        #clock { font-family: 'JetBrains Mono', monospace; color: var(--neon); font-size: 0.9rem; }

        /* Chat Container */
        .app-container { height: calc(100vh - 65px); display: flex; flex-direction: column; padding: 10px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: none; }
        
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; max-width: 85%; line-height: 1.5; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bot { align-self: flex-start; background: var(--glass); border-left: 3px solid var(--neon); border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: var(--neon); color: black; font-weight: 600; border-bottom-right-radius: 2px; }

        /* Input Area & Tombol Glowing */
        .input-section { padding: 10px; background: rgba(0,0,0,0.8); border-radius: 25px; border: 1px solid var(--glass); margin-bottom: 5px; }
        .quick-tags { display: flex; gap: 10px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 5px; }
        .quick-tags button {
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon); color: var(--neon);
            padding: 6px 18px; border-radius: 20px; font-size: 12px; white-space: nowrap; transition: 0.3s;
            display: flex; align-items: center; gap: 5px; cursor: pointer;
        }
        .quick-tags button:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        .input-wrapper { display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px 15px; border-radius: 15px; outline: none; font-size: 14px; }
        #send-btn { 
            background: var(--neon); border: none; width: 50px; height: 45px; 
            border-radius: 15px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 10px var(--neon); display: flex; align-items: center; justify-content: center;
        }

        .hidden { display: none; }
        #loader { text-align: center; color: var(--neon); font-size: 11px; margin-bottom: 8px; font-family: 'JetBrains Mono'; letter-spacing: 1px; }
    </style>
</head>
